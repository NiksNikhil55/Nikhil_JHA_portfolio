<!DOCTYPE html>
<html>
<head>
  <title>Nikhil Kumar Jha Portfolio</title>
  <style>
    body { font-family: Arial; background: #f5f5f5; padding: 20px; }
    .card { background: white; padding: 20px; margin-bottom: 15px; border-radius: 10px; }
    input, textarea { width: 100%; padding: 8px; margin: 5px 0; }
    button { padding: 10px; background: black; color: white; border: none; }
  </style>
</head>

<body>

<h1>Nikhil Kumar Jha</h1>
<p>Operations Manager | Banking | Data Automation</p>

<div class="card">
  <h3>Submit Feedback</h3>
  <input id="name" placeholder="Name">
  <input id="designation" placeholder="Designation">
  <input id="company" placeholder="Company">
  <input id="relation" placeholder="Relation">
  <textarea id="text" placeholder="Feedback"></textarea>
  <input id="image" placeholder="Image URL (optional)">
  <button onclick="submitFeedback()">Submit</button>
</div>

<div class="card">
  <h3>Feedback</h3>
  <div id="feedbackList"></div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxEzq7xmb3KX4uaNXzOKQko8jeptZojMdeVOFmp-5uq8ZNv8diQGKl6R2bstJrbN8p6/exec";

async function loadFeedback() {
  const res = await fetch(API_URL);
  const data = await res.json();

  const container = document.getElementById("feedbackList");
  container.innerHTML = "";

  data.forEach(f => {
    if (f.status === "approved") {
      container.innerHTML += `
        <div style="border:1px solid #ddd; padding:10px; margin:10px 0;">
          ${f.image ? `<img src="${f.image}" width="50"/>` : ""}
          <p><b>${f.name}</b></p>
          <p>${f.designation} @ ${f.company}</p>
          <p>${f.relation}</p>
          <p>${f.text}</p>
        </div>
      `;
    }
  });
}

async function submitFeedback() {
  const data = {
    name: document.getElementById("name").value,
    designation: document.getElementById("designation").value,
    company: document.getElementById("company").value,
    relation: document.getElementById("relation").value,
    text: document.getElementById("text").value,
    image: document.getElementById("image").value,
    status: "pending"
  };

  await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify(data)
  });

  alert("Feedback submitted!");
  loadFeedback();
}

loadFeedback();
</script>

</body>
</html>
